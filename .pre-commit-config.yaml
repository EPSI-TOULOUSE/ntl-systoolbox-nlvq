repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        exclude: ^.*\/files\/.*\.(jpeg|jpg|png|gif)$

  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        name: Black (format code)
        entry: black .
        files: \.py$
        always_run: true

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.2
    hooks:
      - id: ruff-check
        name: Ruff Lint
        files: \.py$
        always_run: true
      - id: ruff-format
        name: Ruff Format
        files: \.py$
        always_run: true
